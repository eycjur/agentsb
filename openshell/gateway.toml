# Copy to ~/.config/openshell/gateway.toml and restart the gateway:
#   make gateway-config
#   systemctl --user restart openshell-gateway
#
# MicroVM (vm) driver is opt-in and never auto-detected.
# GPU passthrough on Linux uses QEMU + VFIO and requires IOMMU plus root
# privileges for GPU bind/unbind on the gateway host.

[openshell]
version = 1

[openshell.gateway]
bind_address = "127.0.0.1:17670"
log_level = "info"
compute_drivers = ["vm"]

[openshell.drivers.vm]
state_dir = "/var/lib/openshell/vm"
driver_dir = "/usr/local/libexec/openshell"
default_image = "ghcr.io/nvidia/openshell/sandbox:latest"
bootstrap_image = "ghcr.io/nvidia/openshell/sandbox:latest"
grpc_endpoint = "https://host.containers.internal:17670"
vcpus = 4
mem_mib = 8192
overlay_disk_mib = 8192
krun_log_level = 1
